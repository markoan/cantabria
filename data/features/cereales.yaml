description: "Los cereales se caracterizan por su valor nutricional, la facilidad de cultivo, la gran variedad de productos alimenticios que se obtienen a partir de ellos y su buena palatabilidad. Debido a sus características intrínsecas, no pueden consumirse tal y como aparecen en la naturaleza, por lo que deben procesarse previamente. Si no se consumiera una cantidad suficiente de cereales, no sería posible alcanzar una dieta equilibrada."
