baseURL = "https://cantabria.recioy.com/"
languageCode = "es-mx"
title = "Abastos Cantabria"
theme = "hugo-universal-theme"

# Site language. Available translations in the theme's `/i18n` directory.
defaultContentLanguage = "es"
# Enable comments by entering your Disqus shortname
# disqusShortname = "devcows"
# Enable Google Analytics by entering your tracking code
googleAnalytics = ""

# Define the number of posts per page
paginate = 10

[menu]

# Main menu

[[menu.main]]
    identifier="home"
    name = "Inicio"
    url  = "/"
    weight = 1

[[menu.main]]
    identifier="productos"
    name = "Productos"
    url  = "/productos/"
    weight = 2

[[menu.main]]
    identifier = "preguntas"
    name = "Preguntas"
    url  = "/preguntas/"
    weight = 3

[[menu.main]]
    identifier = "contacto"
    name = "Contacto"
    url  = "/contact/"
    weight = 4

# Top bar social links menu

[[menu.topbar]]
    weight = 1
    name = "Correo"
    url = "mailto:abastoscantabria@gmail.com"
    pre = "<i class='fas fa-2x fa-envelope'></i>"

[params]
    viewMorePostLink = "/productos/"
    author = "Abastos Cantabria"
    defaultKeywords = ["abastos", "cantabria"]
    mainSections = ["productos"]
    defaultDescription = "Productos"

    # Social media
    facebook_site = "" # the Facebook handle of your site ('https://www.facebook.com/HANDLE')
    twitter_site = "" # the Twitter handle of your site (without the '@')
    default_sharing_image = "img/sharing-default.png"

    # Google Maps API key (if not set will default to not passing a key.)
    googleMapsApiKey = "AIzaSyCFhtWLJcE30xOAjcbSFi-0fnoVmQZPb1Y"

    # Style options: default (light-blue), blue, green, marsala, pink, red, turquoise, violet
    style = "marsala"

    # Since this template is static, the contact form uses www.formspree.io as a
    # proxy. The form makes a POST request to their servers to send the actual
    # email. Visitors can send up to a 1000 emails each month for free.
    #
    # What you need to do for the setup?
    #
    # - set your email address under 'email' below
    # - upload the generated site to your server
    # - send a dummy email yourself to confirm your account
    # - click the confirm link in the email from www.formspree.io
    # - you're done. Happy mailing!
    #
    # Enable the contact form by entering your Formspree.io email
    email = "your@email.com"
    contact_form_ajax = false

    about_us = "<p>Productos </p>"
    copyright = "Abastos Cantabria (c) 2000 - 2020, Abastos Cantabria; Todos los derechos reservados."

    # Format dates with Go's time formatting
    date_format = "January 2, 2006"

    logo = "img/logo.png"
    logo_small = "img/logo-small.png"
    address = """<p class="text-uppercase"><strong>Universal Ltd.</strong>
        <br>Bodega H-32C
        <br>Central de Abastos
        <br>Iztapalapa, Ciudad de México
        <br>09040
        <br>CDMX
        <strong>México</strong>
      </p>
      """
    latitude = "19.3748801"
    longitude = "-99.0931084"

[Permalinks]
    blog = "/blog/:year/:month/:day/:filename/"

# Enable or disable top bar with social icons
[params.topbar]
    enable = true
    text = """<p class="hidden-sm hidden-xs">Contáctenos en el +52 5556940937 y +52 5556944161 o acantabria@gmail.com</p>
      <p class="hidden-md hidden-lg"><a href="tel:+525556940937" data-animate-hover="pulse"><i class="fas fa-phone"></i></a>
      <a href="#" data-animate-hover="pulse"><i class="fas fa-envelope"></i></a>
      </p>
      """

# Enable and disable widgets for the right sidebar
[params.widgets]
    categories = true
    tags = true
    search = true

[params.carousel]
    enable = true
    # All carousel items are defined in their own files. You can find example items
    # at 'exampleSite/data/carousel'.
    # For more informtion take a look at the README.

[params.features]
    enable = true
    # All features are defined in their own files. You can find example items
    # at 'exampleSite/data/features'.
    # For more informtion take a look at the README.

[params.testimonials]
    enable = false
    # All testimonials are defined in their own files. You can find example items
    # at 'exampleSite/data/testimonials'.
    # For more informtion take a look at the README.
    title = "Recomendaciones"
    subtitle = "Nuestros clientes nos recomiendan."

[params.see_more]
    enable = true
    icon = "far fa-file-alt"
    title = "¿Quiere conocer todos nuestros productos?"
    subtitle = "Manejamos una gran variedad de productos como cereales, especies, chiles, frutos secos, leguminosas, oleaginosas, frutos enlatados y alimentos para pájaros."
    link_url = "#"
    link_text = "Solicitar información"

[params.clients]
    enable = false
    # All clients are defined in their own files. You can find example items
    # at 'exampleSite/data/clients'.
    # For more informtion take a look at the README.
    title = "Clientes"
    subtitle = ""

[params.recent_posts]
    enable = false
    title = "Recientes"
    subtitle = "Conozca lo más reciente."
